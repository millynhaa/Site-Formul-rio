<!DOCTYPE html>
<html lang="pt-br">

<head>
  <title>Formulário</title>

  <style>
    body,
    hr {
      background-color: rgb(222, 225, 230);
      font-family: Arial, Helvetica, sans-serif;
    }

    label {
      padding: 10px;
      width: 100px;
      padding-left: 100px;
    }

    input {
      height: 20px;
      width: 400px;
    }

    textarea {
      width: 500px;
      height: 150px;
      resize: none;
      vertical-align: top;
    }

    .interesses input {
      width: auto;
      height: auto;
    }

    .interesses label{
      padding-left: 0px;
    }
  </style>
</head>

<body>

  <h1 style="text-align:center;">Formulário de Cadastro</h1>

  <form>
    <label for="nome">Nome:</label>
    <input type="text" id="nome" name="nome">

    <hr>
    <label for="email">Email:</label>
    <input type="email" id="email" name="email">

    <hr>
    <label for="senha">Senha:</label>
    <input type="password" id="senha" name="senha">

    <hr>
    <label for="idade">Idade:</label>
    <select style="width: 40px;" id="idade" name="idade">
      <option>0</option>
      <option>18</option>
      <option>19</option>
      <option>20</option>
    </select>

    <hr>
    <label for="telefone">Telefone:</label>
    <input type="tel" id="telefone" name="telefone">

    <hr>
    <label for="site">Site:</label>
    <input type="url" id="site" name="site">

    <hr>
    <label for="nascimento">Data de Nascimento:</label>
    <input style="width: 100px;" type="date" id="nascimento" name="nascimento">

    <hr>
    <label for="hora">Hora Preferida:</label>
    <input style="width: 100px;" type="time" id="hora" name="hora">

    <hr>
    <label for="datahora">Data e Hora:</label>
    <input style="width: 100px;" type="datetime-local" id="datahora" name="datahora">

    <hr>
    <label for="cor">Cor Favorita:</label>
    <input style="width: 40px;" type="color" id="cor" name="cor">

    <hr>
    <label for="satisfacao">Nível de Satisfação:</label>
    <input type="range" min="0" max="100" value="50">

    <hr>
    <div style="display: flex;align-items: center;">
      <label>Interesses:</label>
      
      <div class="interesses">
        <label><input type="checkbox"> Futebol</label>
        <label><input type="checkbox"> Programação</label>
        <label><input type="checkbox"> Games</label>
      </div>
    </div>

    <hr>
    <label>Sexo:</label>
    <select>
      <option>Masculino</option>
      <option>Feminino</option>
    </select>

    <hr>
    <label for="observacoes">Observações:</label>
    <textarea id="observacoes" name="observacoes"></textarea>

    <hr>
    <label for="foto">Foto de Perfil:</label>
    <input type="file" id="foto" name="foto" accept="image/png, image/jpeg">

    <hr><br>
    <div style="text-align:center;">
      <input style="background-color: rgb(4, 4, 80);color: white; width: 200px;" type="submit" value="Cadastrar">
      <input style="width: 200px;" type="reset" value="Limpar">
    </div>

  </form>
</body>

</html>
